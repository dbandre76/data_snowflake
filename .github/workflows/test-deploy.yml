name: Deploy Test

on:
  workflow_dispatch:
    inputs:
      target_schema:
        description: 'Schema de destino (ex: public, qa, prd)'
        required: true
        default: 'public'

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Baixar e configurar SnowSQL
        run: |
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.24-linux_x86_64.tar.gz
          mkdir -p $HOME/snowsql
          tar -xzf snowsql-1.2.24-linux_x86_64.tar.gz -C $HOME/snowsql --strip-components=1
          chmod +x $HOME/snowsql/bin/snowsql
          echo "$HOME/snowsql/bin" >> $GITHUB_PATH

      - name: Executar script no Snowflake
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
        run: |
          snowsql \
            -a $SNOWSQL_ACCOUNT \
            -u $SNOWSQL_USER \
            -p $SNOWSQL_PWD \
            -D TARGET_SCHEMA=${{ github.event.inputs.target_schema }} \
            -f poc-snow/sql/views/stg_orders.sql
