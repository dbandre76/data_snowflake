name: Deploy Snowflake View

on:
  workflow_dispatch:
    inputs:
      target_schema:
        description: 'Schema de destino (ex: public, qa, prd)'
        required: true
        default: 'public'

jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libaio1 libncurses6

      - name: Instalar SnowSQL
        run: |
          set -x
          wget https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.3/linux_x86_64/snowsql-1.4.1-linux_x86_64.bash
          SNOWSQL_DEST=/home/runner/.snowsql bash snowsql-1.4.1-linux_x86_64.bash -b || (ls -l && cat snowsql_install.log || true)

      - name: Adicionar SnowSQL ao PATH
        run: echo "/home/runner/.snowsql/bin" >> $GITHUB_PATH

      - name: Executar script no Snowflake
        env:
          SNOWSQL_ACCOUNT: ${{ secrets.SNOWSQL_ACCOUNT }}
          SNOWSQL_USER: ${{ secrets.SNOWSQL_USER }}
          SNOWSQL_PWD: ${{ secrets.SNOWSQL_PWD }}
        run: |
          snowsql -a $SNOWSQL_ACCOUNT -u $SNOWSQL_USER -p $SNOWSQL_PWD \
            -D TARGET_SCHEMA=${{ github.event.inputs.target_schema }} \
            -f poc-snow/sql/views/stg_orders.sql 
